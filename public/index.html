  <style>
    :root {
      --bg1: #ffedf6;
      --bg2: #efe7ff;
      --spot1: rgba(255,255,255,.9);
      --spot2: rgba(255,204,231,.85);
      --ink: #2c1733;
      --muted: #7e6687;
      --card: rgba(255,255,255,.82);
      --accent: #c44f92;
      --accent2: #7c4dff;
      --glow: rgba(196,79,146,.22);
      --shadow: 0 24px 70px rgba(84, 36, 92, .22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 14%, var(--spot1) 0 8%, transparent 30%),
        radial-gradient(circle at 88% 12%, var(--spot2) 0 12%, transparent 32%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      padding: 24px;
      transition: background .35s ease, color .2s ease;
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .content {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 20px;
      align-items: start;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.2rem);
      letter-spacing: -.06em;
      line-height: .95;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .pill {
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 10px 30px rgba(83, 38, 86, .08);
      color: var(--muted);
      font-weight: 700;
    }

    .menu {
      display: flex;
      gap: 10px;
      flex-direction: column;
      padding: 12px;
      background: rgba(255,255,255,.45);
      border: 1px solid rgba(255,255,255,.65);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      position: sticky;
      top: 24px;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .category-btn {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255,255,255,.72);
      font-weight: 800;
      text-align: left;
      transition: transform .16s ease, background .16s ease, color .16s ease;
    }

    .category-btn:hover { transform: translateY(-2px); }

    .category-btn.active {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .stage {
      min-height: 470px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 14px;
    }

    .card {
      width: min(650px, 100%);
      min-height: 380px;
      padding: clamp(28px, 6vw, 54px);
      border-radius: 38px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.85);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -80px auto auto -80px;
      width: 190px;
      height: 190px;
      background: radial-gradient(circle, var(--glow), transparent 68%);
      border-radius: 50%;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-weight: 800;
      font-size: .92rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .question {
      margin: 38px 0;
      font-size: clamp(2rem, 6.2vw, 3.5rem);
      line-height: 1.02;
      letter-spacing: -.05em;
      font-weight: 900;
    }

    .depth {
      font-size: 1.25rem;
      letter-spacing: .12em;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      width: min(650px, 100%);
    }

    .action {
      padding: 14px 20px;
      border-radius: 18px;
      background: white;
      color: var(--ink);
      font-weight: 900;
      box-shadow: 0 12px 30px rgba(84, 36, 92, .13);
    }

    .action.icon-action {
      width: 54px;
      padding: 14px 0;
      font-size: 1.25rem;
      line-height: 1;
    }

    .action.primary {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .action.danger {
      color: white;
      background: linear-gradient(135deg, #cf2e55, #b5179e);
    }

    .answer-panel {
      width: min(650px, 100%);
      margin: 4px auto 0;
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: 0 12px 30px rgba(84, 36, 92, .1);
      color: var(--ink);
    }

    .answer-title {
      margin: 0 0 10px;
      font-size: .88rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .answer-text {
      margin: 0;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 1.02rem;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28, 14, 35, .5);
      backdrop-filter: blur(4px);
      display: grid;
      place-items: center;
      z-index: 40;
      padding: 18px;
    }

    .modal-overlay[hidden] {
      display: none !important;
    }

    .modal {
      width: min(640px, 100%);
      border-radius: 24px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.85);
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .modal h2 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -.02em;
    }

    .modal p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .answer-input {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.12);
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      background: rgba(255,255,255,.92);
      line-height: 1.45;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .counter {
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .content {
        grid-template-columns: 1fr;
      }
      .menu {
        flex-direction: row;
        flex-wrap: wrap;
        position: static;
      }
      .stage { min-height: 420px; }
      .card { min-height: 340px; border-radius: 30px; }
      .category-btn { flex: 1 1 auto; }
      .action { flex: 1; }
    }

    .room-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .room-bar .action {
      padding: 10px 14px;
      font-size: 0.85rem;
    }

    .sync-status {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .card.action-card .question::before {
      content: "Do this together";
      display: block;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .card-type {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
    }

    .sync-status.error {
      color: #c62828;
    }

    .ad-slot {
      min-height: 0;
      margin-top: 12px;
      padding: 8px 0;
      border-radius: 16px;
      overflow: hidden;
      text-align: center;
      width: 100%;
    }

    .ad-slot[hidden] {
      display: none;
    }
  </style>

</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Connection Cards</h1>
        <p class="subtitle">Pick a category, draw a card, answer questions or complete actions together.</p>
      </div>
      <div class="room-bar">
        <div class="pill" id="totalPill">140 cards</div>
        <div class="pill">Room: <strong id="roomCode">…</strong></div>
        <button class="action" type="button" id="copyRoomBtn">Copy link</button>
        <span class="sync-status" id="syncStatus">Connecting…</span>
      </div>
    </header>

    <div class="content">
      <nav class="menu" id="categoryMenu"></nav>

      <section class="stage">
        <article class="card" id="cardSurface">
          <div class="meta">
            <span id="categoryLabel"></span>
            <span id="cardMeta"></span>
          </div>
          <div class="question" id="questionText"></div>
          <div class="meta">
            <span id="depthLabel"></span>
            <span class="depth" id="hearts"></span>
          </div>
        </article>
        <div class="controls">
          <button class="action icon-action" id="prevBtn" aria-label="Previous card" title="Previous card">←</button>
          <button class="action primary icon-action" id="nextBtn" aria-label="Next card" title="Next card">→</button>
          <button class="action" id="shuffleBtn">Shuffle</button>
          <button class="action" id="skipBtn">Skip Question</button>
          <button class="action" id="answerBtn">Answer Card</button>
        </div>
        <div class="ad-slot" id="adFooter" data-ad-unit="footer" hidden aria-label="Advertisement"></div>
      </section>
    </div>

    <section class="answer-panel" id="answerPanel" hidden></section>

    <div class="counter" id="counter"></div>
  </main>

  <div class="modal-overlay" id="answerModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="answerModalTitle">
      <h2 id="answerModalTitle">Answer This Card</h2>
      <p id="answerModalQuestion"></p>
      <textarea
        id="answerInput"
        class="answer-input"
        placeholder="Type your note here..."
        maxlength="2000"
      ></textarea>
      <div class="modal-actions">
        <button class="action" id="answerCancelBtn">Cancel</button>
        <button class="action primary" id="answerSaveBtn">Save Answer</button>
      </div>
    </div>
  </div>

      return window.connectionCardsFirebase.db.ref(`rooms/${roomId}`);
    }

    function generateRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 8; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    function getOrCreateRoomId() {
      const fromUrl = new URLSearchParams(location.search).get("room");
      if (fromUrl) {
        const code = fromUrl.trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 12);
        if (code) {
          localStorage.setItem(ROOM_KEY, code);
          return code;
        }
      }

      let stored = localStorage.getItem(ROOM_KEY);
      if (!stored) {
        stored = generateRoomCode();
        localStorage.setItem(ROOM_KEY, stored);
      }
      return stored;
    }

    async function initFirebase() {
      try {
        const { auth, db } = window.connectionCardsFirebase;
        syncStatus.textContent = "Connecting…";
        await auth.signInAnonymously();
        roomId = getOrCreateRoomId();
        roomCodeEl.textContent = roomId;

        if (new URLSearchParams(location.search).get("room")) {
          history.replaceState(null, "", location.pathname);
        }

        db.ref(`rooms/${roomId}`).on(
          "value",
          snapshot => {
            const data = snapshot.val() || {};
            answersById = {};
            for (const [id, entry] of Object.entries(data.answers || {})) {
              answersById[id] = entry.answer || "";
            }
            skippedIds = Object.keys(data.skipped || {}).map(Number);
            firebaseReady = true;
            syncStatus.textContent = "Synced";
            syncStatus.classList.remove("error");
            currentDeck = getDeckForCategory(activeCategory);
            renderMenu();
            renderCard();
          },
          error => {
            syncStatus.textContent = "Sync error";
            syncStatus.classList.add("error");
            console.error(error);
          }
        );
      } catch (error) {
        syncStatus.textContent = "Could not connect";
        syncStatus.classList.add("error");
        console.error(error);
      }
    }

        glow: "rgba(255,159,28,.25)",
        shadow: "0 24px 70px rgba(146, 85, 40, .24)"
      },
      "Appreciation": {

        spot1: "rgba(255,255,255,.9)",
        spot2: "rgba(255,222,163,.58)",

        card: "rgba(255,255,255,.86)",
        accent: "#f4a261",
        accent2: "#e76f51",
        glow: "rgba(244,162,97,.24)",
        shadow: "0 24px 70px rgba(132, 88, 46, .22)"
      },
      "Connection Actions": {
        bg1: "#fff0e8",
        bg2: "#ffe8f0",
        spot1: "rgba(255,255,255,.92)",
        spot2: "rgba(255,180,160,.45)",
        ink: "#3a1f24",
        muted: "#8a5f68",
        card: "rgba(255,255,255,.86)",
        accent: "#e85d7a",
        accent2: "#ff8c42",
        glow: "rgba(232,93,122,.22)",
        shadow: "0 24px 70px rgba(120, 48, 56, .2)"
      },
      "Vulnerable & Honest": {
        bg1: "#eaf6ff",
        bg2: "#efeaff",
        spot1: "rgba(255,255,255,.92)",
        spot2: "rgba(168,198,255,.58)",
        ink: "#1f2a44",
        muted: "#5d6988",
        card: "rgba(255,255,255,.86)",
        accent: "#4f79ff",
        accent2: "#7a5cff",
        glow: "rgba(79,121,255,.24)",
        shadow: "0 24px 70px rgba(56, 73, 126, .24)"
      },
      "This or That": {
        bg1: "#fff3df",
        bg2: "#ffe8ef",
        spot1: "rgba(255,255,255,.92)",
        spot2: "rgba(255,172,138,.58)",
        ink: "#3f281f",
        muted: "#8a665a",
        card: "rgba(255,255,255,.86)",
        accent: "#ff7a59",
        accent2: "#ff4d8d",
        glow: "rgba(255,122,89,.24)",
        shadow: "0 24px 70px rgba(125, 74, 62, .24)"
      },
      "Skipped": {
        bg1: "#f3f0ff",
        bg2: "#eef3ff",
        spot1: "rgba(255,255,255,.92)",
        spot2: "rgba(180,190,255,.55)",
        ink: "#2a2640",
        muted: "#6b6785",
        card: "rgba(255,255,255,.86)",
        accent: "#6c63ff",
        accent2: "#9b8cff",
        glow: "rgba(108,99,255,.24)",
        shadow: "0 24px 70px rgba(62, 58, 112, .22)"
      },
      "Answered": {
        bg1: "#e9fff5",
        bg2: "#e9f8ff",
        spot1: "rgba(255,255,255,.92)",
        spot2: "rgba(130,230,193,.5)",
        ink: "#173229",
        muted: "#4e7a69",
        card: "rgba(255,255,255,.86)",
        accent: "#1f9d78",
        accent2: "#2f80ed",
        glow: "rgba(31,157,120,.25)",
        shadow: "0 24px 70px rgba(33, 101, 84, .22)"
      }
    };

    function isActionCard(card) {
      return card && card.type === "action";
    }

    function getCardText(card) {
      return card.action || card.question || "";
    }

    function getAnswer(cardId) {
      return answersById[String(cardId)] || "";
    }

    function isAnswered(cardId) {
      return getAnswer(cardId).trim().length > 0;
    }

    function isSkipped(cardId) {
      return skippedIds.includes(Number(cardId));
    }

    async function skipCard(cardId) {
      if (!firebaseReady) return;
      const id = Number(cardId);
      if (!skippedIds.includes(id)) {
        await roomRef().child(`skipped/${id}`).set(true);
      }
    }

    async function unskipCard(cardId) {
      if (!firebaseReady) return;
      await roomRef().child(`skipped/${cardId}`).remove();
    }

    function getDeckForCategory(category) {
      if (category === ANSWERED_CATEGORY) {
        return cards.filter(card => isAnswered(card.id));
      }

      if (category === SKIPPED_CATEGORY) {
        return cards.filter(card => isSkipped(card.id) && !isAnswered(card.id));
      }

      const availableCards = cards.filter(card => !isAnswered(card.id) && !isSkipped(card.id));
      return category === "All"
        ? availableCards
        : availableCards.filter(card => card.category === category);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderAnswerPanel(card) {
      if (activeCategory !== ANSWERED_CATEGORY || !card) {
        answerPanel.hidden = true;
        answerPanel.innerHTML = "";
        return;
      }

      answerPanel.hidden = false;
      const completed = isActionCard(card);
      const saved = getAnswer(card.id);
      const displayAnswer = completed && saved === "Done" ? "Completed ✓" : saved;
      answerPanel.innerHTML = `
        <p class="answer-title">${completed ? "Completed Action" : "Saved Answer"}</p>
        <p class="answer-text">${escapeHtml(displayAnswer)}</p>
        <div class="controls">
          <button class="action danger" id="deleteAnswerBtn">${completed ? "Undo Completion" : "Delete Answer"}</button>
        </div>
      `;

      const deleteBtn = document.getElementById("deleteAnswerBtn");
      deleteBtn.addEventListener("click", async () => {
        if (!firebaseReady) return;
        await roomRef().child(`answers/${card.id}`).remove();

        currentDeck = getDeckForCategory(activeCategory);
        currentIndex = Math.min(currentIndex, Math.max(0, currentDeck.length - 1));

        if (currentDeck.length === 0) {
          activeCategory = "All";
          applyTheme(activeCategory);
          currentDeck = getDeckForCategory(activeCategory);
          currentIndex = 0;
        }

        renderMenu();
        renderCard();
      });
    }

    function openAnswerModal(card) {
      const isAction = isActionCard(card);
      modalCardId = card.id;
      answerModalTitle.textContent = isAction ? "Complete This Action" : "Answer This Card";
      answerModalQuestion.textContent = `Card #${card.id}: ${getCardText(card)}`;
      answerInput.placeholder = isAction
        ? "Add a note about how it went (optional)..."
        : "Type your note here...";
      const saved = getAnswer(card.id);
      answerInput.value = isAction && saved === "Done" ? "" : saved;
      answerSaveBtn.textContent = isAction ? "Mark Complete" : "Save Answer";
      answerModal.hidden = false;
      answerInput.focus();
    }

    function closeAnswerModal() {
      answerModal.hidden = true;
      modalCardId = null;
      answerInput.value = "";
      answerInput.placeholder = "Type your note here...";
      answerModalQuestion.textContent = "";
      answerModalTitle.textContent = "Answer This Card";
      answerSaveBtn.textContent = "Save Answer";
    }

    async function saveModalAnswer() {
      if (modalCardId === null || !firebaseReady) return;

      const trimmedAnswer = answerInput.value.trim();
      const card = cards.find(entry => entry.id === modalCardId);
      if (!card) return;

      const isAction = isActionCard(card);
      if (!isAction && !trimmedAnswer) {
        window.alert("Please enter a note to save this answer.");
        return;
      }

      answerSaveBtn.disabled = true;
      try {
        await roomRef().child(`answers/${modalCardId}`).set({
          answer: trimmedAnswer || "Done",
          question: getCardText(card),
          type: card.type || "question",
          answeredAt: firebase.database.ServerValue.TIMESTAMP
        });
        await roomRef().child(`skipped/${modalCardId}`).remove();
        closeAnswerModal();

        currentDeck = getDeckForCategory(activeCategory);
        currentIndex = Math.min(currentIndex, Math.max(0, currentDeck.length - 1));

        renderMenu();
        renderCard();
      } catch (error) {
        console.error(error);
        window.alert(isAction ? "Could not mark this action complete. Please try again." : "Could not save your answer. Please try again.");
      } finally {
        answerSaveBtn.disabled = false;
      }
    }

    function applyTheme(category) {
      const theme = categoryThemes[category] || categoryThemes.All;
      rootStyle.setProperty("--bg1", theme.bg1);
      rootStyle.setProperty("--bg2", theme.bg2);
      rootStyle.setProperty("--spot1", theme.spot1);
      rootStyle.setProperty("--spot2", theme.spot2);
      rootStyle.setProperty("--ink", theme.ink);
      rootStyle.setProperty("--muted", theme.muted);
      rootStyle.setProperty("--card", theme.card);
      rootStyle.setProperty("--accent", theme.accent);
      rootStyle.setProperty("--accent2", theme.accent2);
      rootStyle.setProperty("--glow", theme.glow);
      rootStyle.setProperty("--shadow", theme.shadow);
    }

    function renderMenu() {
      menu.innerHTML = "";
      categories.forEach(category => {
        const btn = document.createElement("button");
        btn.className = "category-btn" + (category === activeCategory ? " active" : "");
        btn.textContent = category;
        btn.addEventListener("click", () => {
          activeCategory = category;
          currentDeck = getDeckForCategory(category);
          currentIndex = 0;
          applyTheme(category);
          renderMenu();
          renderCard();
        });
        menu.appendChild(btn);
      });
    }

    function renderCard() {
      const card = currentDeck[currentIndex];

      const inAnswered = activeCategory === ANSWERED_CATEGORY;
      const inSkipped = activeCategory === SKIPPED_CATEGORY;
      answerBtn.style.display = inAnswered ? "none" : "inline-block";
      skipBtn.style.display = inAnswered || inSkipped ? "none" : "inline-block";
      cardSurface.classList.remove("action-card");

      if (!card) {
        categoryLabel.textContent = inAnswered
          ? "Answered & Completed"
          : inSkipped
            ? "Skipped Cards"
            : "No Cards Left";
        cardMeta.textContent = "";
        questionText.textContent = inAnswered
          ? "No answered cards or completed actions yet."
          : inSkipped
            ? "No skipped cards yet."
            : "Every card in this category has been answered or skipped.";
        depthLabel.textContent = "";
        hearts.textContent = "";
        counter.textContent = `0 cards in ${activeCategory}`;
        totalPill.textContent = "0 cards";
        renderAnswerPanel(null);
        return;
      }

      const isAction = isActionCard(card);
      cardSurface.classList.toggle("action-card", isAction);
      categoryLabel.textContent = card.category;
      cardMeta.textContent = `Card #${card.id} · ${isAction ? "Action" : "Question"}`;
      questionText.textContent = getCardText(card);
      depthLabel.textContent = `Depth ${card.depth}`;
      hearts.textContent = "♥".repeat(card.depth);
      answerBtn.textContent = isAction ? "We Did It" : "Answer Card";
      skipBtn.textContent = isAction ? "Skip Action" : "Skip Question";
      counter.textContent = `${currentIndex + 1} of ${currentDeck.length} in ${activeCategory}`;
      totalPill.textContent = `${currentDeck.length} cards`;
      renderAnswerPanel(card);
    }

    function nextCard() {
      if (currentDeck.length === 0) return;
      currentIndex = (currentIndex + 1) % currentDeck.length;
      renderCard();
    }

    function previousCard() {
      if (currentDeck.length === 0) return;
      currentIndex = (currentIndex - 1 + currentDeck.length) % currentDeck.length;
      renderCard();
    }

    function shuffleDeck() {
      if (currentDeck.length === 0) return;
      for (let i = currentDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
      }
      currentIndex = 0;
      renderCard();
    }

    document.getElementById("nextBtn").addEventListener("click", nextCard);
    document.getElementById("prevBtn").addEventListener("click", previousCard);
    document.getElementById("shuffleBtn").addEventListener("click", shuffleDeck);
    skipBtn.addEventListener("click", () => {
      const card = currentDeck[currentIndex];
      if (!card || activeCategory === ANSWERED_CATEGORY || activeCategory === SKIPPED_CATEGORY) return;

      skipCard(card.id);

      currentDeck = getDeckForCategory(activeCategory);
      currentIndex = Math.min(currentIndex, Math.max(0, currentDeck.length - 1));

      renderMenu();
      renderCard();
    });
    answerBtn.addEventListener("click", () => {
      const card = currentDeck[currentIndex];
      if (!card || activeCategory === ANSWERED_CATEGORY) return;
      openAnswerModal(card);
    });

    answerCancelBtn.addEventListener("click", closeAnswerModal);
    answerSaveBtn.addEventListener("click", saveModalAnswer);
    answerModal.addEventListener("click", event => {
      if (event.target === answerModal) closeAnswerModal();
    });
    answerInput.addEventListener("keydown", event => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "enter") {
        saveModalAnswer();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !answerModal.hidden) {
        closeAnswerModal();
        return;
      }

      const targetTag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : "";
      if (targetTag === "textarea" || targetTag === "input") return;
      if (!answerModal.hidden) return;

      if (event.key === "ArrowRight" || event.key === " ") nextCard();
      if (event.key === "ArrowLeft") previousCard();
      if (event.key.toLowerCase() === "s") shuffleDeck();
    });

    copyRoomBtn.addEventListener("click", async () => {
      if (!roomId) return;
      const url = `${location.origin}${location.pathname}?room=${roomId}`;
      try {
        await navigator.clipboard.writeText(url);
        syncStatus.textContent = "Link copied";
        setTimeout(() => {
          if (firebaseReady) syncStatus.textContent = "Synced";
        }, 2000);
      } catch (_error) {
        window.prompt("Copy this link to share your room:", url);
      }
    });

    currentDeck = getDeckForCategory(activeCategory);
    applyTheme(activeCategory);
    renderMenu();
    renderCard();
    initFirebase();
  </script>
</body>
